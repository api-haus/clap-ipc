# Compile clap-ipc on Linux/Windows/macOS for every branch push and PR (no release).
name: ci

on:
  push:
    branches-ignore: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-x86_64 }
          - { os: macos-latest, platform: macos }
          - { os: windows-latest, platform: win-x86_64 }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build pkg-config portaudio19-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja pkg-config portaudio

      - name: MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install ninja pkgconfiglite -y --no-progress
          vcpkg install portaudio:x64-windows
          echo "PKG_CONFIG_PATH=$VCPKG_INSTALLATION_ROOT/installed/x64-windows/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          extra=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            extra="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release $extra

      - name: Build
        run: cmake --build build --target clap_ipc --config Release

      - name: Verify binary
        shell: bash
        run: |
          name="clap-ipc"
          [ "${{ runner.os }}" = "Windows" ] && name="clap-ipc.exe"
          bin="$(find build -type f -name "$name" | head -1)"
          if [ -z "$bin" ]; then echo "clap-ipc binary not found"; exit 1; fi
          echo "built $bin"
